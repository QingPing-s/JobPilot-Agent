name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      JOBPILOT_EMBEDDING_BACKEND: simple
      JOBPILOT_AUTH_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check src tests eval scripts
      - run: pytest -q
      - run: python eval/run_eval.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm test
      - working-directory: frontend
        run: npm run build

  smoke:
    runs-on: ubuntu-latest
    env:
      JOBPILOT_EMBEDDING_BACKEND: simple
      JOBPILOT_AUTH_ENABLED: "false"
      JOBPILOT_UI_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: pip install -r requirements.txt
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx playwright install --with-deps chromium
      - working-directory: frontend
        run: npm run build
      - run: python -m uvicorn src.api:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
      - run: |
          for i in {1..60}; do
            curl --fail http://127.0.0.1:8000/api/health && exit 0
            sleep 2
          done
          cat uvicorn.log
          exit 1
      - working-directory: frontend
        run: npm run smoke:ui
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            outputs/jobpilot_ui_smoke*.png
            uvicorn.log

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: jobpilot-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
